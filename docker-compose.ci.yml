version: "3.9"

services:
  backend:
    image: stargem-backend:latest
    environment:
      - DATABASE_URL=postgres://stargem:stargem@postgres:5432/stargem
      - GRPC_ADDR=0.0.0.0:50051
      - QUIC_ADDR=0.0.0.0:50052
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stargem
      POSTGRES_PASSWORD: stargem
      POSTGRES_DB: stargem
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stargem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
