syntax = "proto3";

package stargem.match_history;

service MatchHistoryService {
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
}

message MatchRecord {
  string match_id = 1;
  int64 timestamp = 2;
  int32 kills = 3;
  int32 deaths = 4;
  float damage_dealt = 5;
  float damage_taken = 6;
  string result = 7;
}

message GetHistoryRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetHistoryResponse {
  repeated MatchRecord matches = 1;
}
