syntax = "proto3";

package stargem.quic.common;

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message Quaternion {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

message PlayerId {
  string id = 1;
}

message ShipId {
  string id = 1;
}

message MatchId {
  string id = 1;
}
